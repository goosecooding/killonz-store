{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login — KILLONZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#1a0a2e,#2b0f3f,#4a1d6d); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:#fff; border-radius:20px; padding:44px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
        .login-logo { text-align:center; margin-bottom:28px; }
        .login-logo h1 { font-family:'Be Vietnam Pro',sans-serif; font-size:2.2rem; font-weight:900; color:#2b0f3f; }
        .login-logo p { color:#888; font-size:0.9rem; margin-top:4px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:13px; font-weight:700; color:#444; margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#888; }
        .form-group input { width:100%; padding:11px 14px 11px 40px; border:2px solid #e0e0e0; border-radius:10px; font-family:'Poppins',sans-serif; font-size:0.95rem; outline:none; transition:border-color .2s; }
        .form-group input:focus { border-color:#2b0f3f; }
        .btn-login { width:100%; padding:13px; background:linear-gradient(135deg,#2b0f3f,#5c2d8c); color:#fff; border:none; border-radius:10px; font-family:'Poppins',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:transform .2s, box-shadow .2s; margin-top:6px; }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(43,15,63,0.35); }
        .error-msg { background:#f8d7da; color:#721c24; border-left:4px solid #dc3545; padding:12px 16px; border-radius:8px; margin-bottom:18px; font-size:0.9rem; }
        .back-link { text-align:center; margin-top:18px; }
        .back-link a { color:#888; text-decoration:none; font-size:0.85rem; }
        .back-link a:hover { color:#2b0f3f; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <h1>KILLONZ</h1>
        <p>Owner Dashboard Login</p>
    </div>
    {% if messages %}
    {% for message in messages %}
    <div class="error-msg">{{ message }}</div>
    {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
        </div>
        <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket" style="margin-right:8px"></i>Login to Dashboard</button>
    </form>
    <div class="back-link"><a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Back to Store</a></div>
</div>
</body>
</html>
